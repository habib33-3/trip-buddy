name: trip-buddy

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "5000:5000"
      - "5555:5555"
    env_file:
      - ./apps/backend/.env
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_BACKEND_API_URL: ${VITE_BACKEND_API_URL}
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: trip-buddy-db
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.1-alpine
    container_name: redis_server
    restart: always
    volumes:
      - redis-data:/var/lib/redis/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg-data:
  redis-data:
