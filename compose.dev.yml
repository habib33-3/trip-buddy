# compose.dev.yml

services:
  backend:
    container_name: trip_buddy_backend_dev
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        BUILD_APP: trip-buddy-backend
      target: dev
    volumes:
      - ./apps/backend:/app/apps/backend
      - /app/apps/backend/node_modules
    env_file:
      - ./apps/backend/.env
    environment:
      - NODE_ENV=development
    ports:
      - "5000:5000"
    networks:
      - app-network
      - internal-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: sh -c "pnpm --filter=trip-buddy-backend db:generate && pnpm --filter=trip-buddy-backend dev"

  
  frontend:
    container_name: trip_buddy_frontend_dev
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    command: pnpm --filter=trip-buddy-frontend dev --host 0.0.0.0
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/apps/frontend/node_modules
    env_file:
      - ./apps/frontend/.env
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_API_URL=http://localhost:5000
      - VITE_HMR_HOST=localhost   # 👈 tells Vite client to connect back to host
      - VITE_HMR_PORT=5173  
    ports:
      - "5173:5173"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
